# Regional Market Parameters (from White Paper §3)
# 6 major regional markets with detailed characteristics

regions:
  - id: "china"
    name: "中国大陆"
    description: "全球最大智能手机市场，竞争激烈，消费者对技术参数敏感"
    market_size: 28000  # 万台/年
    growth_rate: 0.02
    avg_selling_price: 3200  # 元
    price_sensitivity: "medium"
    tech_adoption: "high"  # 新技术接受度
    key_segments:
      - name: "高端旗舰"
        price_range: [5000, 12000]
        share: 0.22
      - name: "中端性能"
        price_range: [2000, 5000]
        share: 0.38
      - name: "入门性价比"
        price_range: [500, 2000]
        share: 0.40
    channel_distribution:
      online: 0.35
      offline: 0.55
      carrier: 0.10
    trend_weights:
      "折叠屏": 1.6
      "端侧AI": 1.5
      "影像旗舰": 1.4
      "快充": 1.2
    regulatory_notes: "工信部入网许可、CCC认证、数据安全法合规"

  - id: "india"
    name: "印度"
    description: "增长最快的新兴市场，价格敏感度极高，功能机仍占40%份额"
    market_size: 15000
    growth_rate: 0.08
    avg_selling_price: 1200
    price_sensitivity: "very_high"
    tech_adoption: "low"
    key_segments:
      - name: "入门智能机"
        price_range: [500, 1500]
        share: 0.55
      - name: "中端智能机"
        price_range: [1500, 3000]
        share: 0.30
      - name: "高端智能机"
        price_range: [3000, 8000]
        share: 0.15
    channel_distribution:
      online: 0.40
      offline: 0.50
      carrier: 0.10
    trend_weights:
      "高性价比": 2.0
      "长续航": 1.5
      "大内存": 1.3
    regulatory_notes: "BIS认证、本地化生产要求、FDI政策限制"

  - id: "sea"
    name: "东南亚"
    description: "印尼、越南、菲律宾等市场，中端需求旺盛，电商渠道增长迅速"
    market_size: 9000
    growth_rate: 0.05
    avg_selling_price: 1800
    price_sensitivity: "high"
    tech_adoption: "medium"
    key_segments:
      - name: "入门智能机"
        price_range: [500, 1500]
        share: 0.45
      - name: "中端智能机"
        price_range: [1500, 3500]
        share: 0.40
      - name: "高端智能机"
        price_range: [3500, 8000]
        share: 0.15
    channel_distribution:
      online: 0.30
      offline: 0.60
      carrier: 0.10
    trend_weights:
      "高性价比": 1.8
      "自拍": 1.4
      "长续航": 1.3
    regulatory_notes: "各国认证不同（印尼TKDN、越南CR标志等）"

  - id: "europe"
    name: "欧洲"
    description: "成熟高端市场，利润率高，但对合规和环保要求严格"
    market_size: 12000
