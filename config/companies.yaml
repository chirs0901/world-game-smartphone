# World Game — 可选公司配置（玩家品牌）

companies:
  - id: "apply"
    name: "Apply"
    tagline: "Think Innovation"
    logo_emoji: "🍎"
    country: "美国"
    description: "全球最具价值的科技品牌之一，拥有强大的生态系统和忠实的用户群体。产品线覆盖高端手机、平板、笔记本。自研芯片和操作系统形成深厚护城河。"
    strengths: ["生态系统", "品牌溢价", "自研芯片", "用户忠诚度"]
    weaknesses: ["创新放缓", "价格过高", "市场份额下滑"]
