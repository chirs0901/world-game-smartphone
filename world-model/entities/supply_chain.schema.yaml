# ============================================================
# Supply Chain Schema — 供应商 + 传导链路
#
# 供应链不是静态列表，而是有向图。
# - suppliers：供应商也是 Agent，有自己的产能、DNA、技术依赖。
# - links：品牌与供应商之间的资源分配关系。
# - propagation_rules：上游扰动如何向下游传导。
# ============================================================

# ──────────────────────────────────────────────────
# 供应商 Agent
# ──────────────────────────────────────────────────
