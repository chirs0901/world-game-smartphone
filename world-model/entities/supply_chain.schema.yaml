# ──────────────────────────────────────────────────
# 传导规则：上游扰动 → 下游效应
# ──────────────────────────────────────────────────
propagation_rules:
  # TSMC 产能紧张 → 下游品牌成本上升
  - id: prop_tsmc_capacity_crunch
    condition:
      supplier: supplier_tsmc
      metric: "utilization"
      resource: "3nm_wafer_capacity"
      operator: "gte"
      threshold: 0.95
    effect:
      - target: "all_linked_brands.soc_cost"
        operation: multiply
        value: 1.15                     # 加价15%
      - target: "brands_not_on_tsmc.competitive_advantage"
        operation: add
        value: 5                        # 非TSMC客户获得竞争优势
      - target: "all_linked_brands.supply_stability"
        operation: add
        value: -8

  # 供应商突发减产（如地震、火灾）
  - id: prop_supplier_emergency_cut
    condition:
      event: "capacity_reduction"
      threshold_pct: 0.2               # 产能减少超过20%
    effect:
      - target: "all_linked_brands.production_delay_quarters"
        operation: add
        value: 1
      - target: "competitor_brands.opportunity_market_share"
        operation: "market_share_transfer"
        value: 3                        # 3%份额转移给竞争对手
      - target: "affected_links.cost_per_unit"
        operation: multiply
        value: 1.25                     # 现货价飙升25%

  # 地缘政治：TSMC 被限制供货给某客户
  - id: prop_geopolitical_tsmc_restriction
    condition:
      supplier: supplier_tsmc
      event: "export_restriction"
    effect:
      - target: "affected_brand.supply_stability"
        operation: set
        value: 25                       # 供应稳定性骤降
      - target: "affected_brand.production_delay_quarters"
        operation: add
        value: 2
      - target: "competitor_brands.windfall_market_share"
        operation: "market_share_transfer"
        value: 8

  # 供应过剩 → 组件降价
  - id: prop_oversupply_discount
    condition:
      supplier: supplier_boe
      metric: "utilization"
      resource: "oled_panel"
      operator: "lte"
      threshold: 0.60
    effect:
      - target: "all_linked_brands.panel_cost"
        operation: multiply
        value: 0.88                     # 降价12%
      - target: "all_linked_brands.margin_boost"
        operation: add
        value: 3
