# ============================================================
# Company Agent Schema — 公司智能体定义
#
# 每个公司是一个有 DNA、目标函数、自主决策周期的 Agent。
# DNA 是不可变的行为倾向（0-1），驱动 Agent 的每个决策。
# goal_function 定义了 Agent 每个周期优化的目标。
# decision_period 控制 Agent 多久做一次战略决策（单位：tick/季度）。
# ============================================================

companies:
  # ──────────────────────────────────────────────────
  # Apple — 生态护城河 + 利润第一
  # ──────────────────────────────────────────────────
  - id: brand_apple
    name: "Apple"
    country: "美国"
    logo_emoji: "🍎"
    tagline: "Think Different"
    description: "全球最具价值的科技品牌，自研A系列/M系列芯片和iOS封闭生态形成深厚护城河。"

    dna:
      profit_first: 0.9                  # 利润优先
      innovation_lead: 0.85              # 创新引领
      ecosystem_lock: 0.95               # 生态锁定
      volume_aggressive: 0.2             # 不追求出货量
      price_aggressive: 0.1              # 不参与价格战
      supply_diversify: 0.7              # 供应链分散
      risk_appetite: 0.4                 # 中等风险偏好

    goal_function:
      maximize:
        - profit_margin
        - ecosystem_strength
        - ai_leadership
      constraints:
        - "never_enter_sub_400_usd"       # 低于$400绝不进入
        - "key_component_dual_source"      # 关键部件双源供应

    decision_period: 4                    # 每年做一次战略级决策

    initial_state:
      cash_reserve: 120.0                # 亿元
      brand_heat: 88                     # 0-100
      tech_leadership: 85
      market_share: 18
      supply_stability: 75
      customer_satisfaction: 82
      morale: 75
      profit_margin: 35.0                # 利润率%

    product_lineup:
      - iphone_16_pro_max
      - iphone_16_pro
      - iphone_16

    supply_chain:
      - supplier: supplier_tsmc
        resource: "3nm_wafer_capacity"
        allocation_pct: 35
      - supplier: supplier_samsung_display
        resource: "ltpo_oled_panel"
        allocation_pct: 40
      - supplier: supplier_sony
        resource: "cmos_sensor"
        allocation_pct: 25

    ai_strategy:
      positioning: "端侧AI生态引领者"
      key_investment: ["自研NPU架构", "端侧大模型压缩", "多模态AI助手"]
      differentiation: "Apple Intelligence深度集成生态，AI能力跨设备协同"

  # ──────────────────────────────────────────────────
  # Samsung — 全产业链 + 折叠屏先发
  # ──────────────────────────────────────────────────
  - id: brand_samsung
    name: "Samsung"
    country: "韩国"
    logo_emoji: "📱"
    tagline: "Do What You Can't"
    description: "全球出货量最大的手机制造商，全产业链垂直整合，折叠屏技术全球领先。"

    dna:
      profit_first: 0.5
      innovation_lead: 0.75
      ecosystem_lock: 0.6
      volume_aggressive: 0.85            # 追求出货量
      price_aggressive: 0.5
      supply_diversify: 0.3              # 自有产能强，不急于分散
      risk_appetite: 0.5

    goal_function:
      maximize:
        - global_shipment_volume
        - display_technology_lead
        - foldable_market_dominance
      constraints:
        - "component_divisions_also_profitable"  # 零部件业务也要盈利

    decision_period: 2                    # 每半年做一次决策

    initial_state:
      cash_reserve: 80.0
      brand_heat: 78
      tech_leadership: 80
      market_share: 20
      supply_stability: 88               # 自产能力强
      customer_satisfaction: 68
      morale: 70
      profit_margin: 18.0

    product_lineup:
      - galaxy_s25_ultra
      - galaxy_s24_ultra
      - galaxy_z_fold6

    supply_chain:
      - supplier: supplier_tsmc
        resource: "3nm_wafer_capacity"
        allocation_pct: 10
      - supplier: supplier_samsung_display
        resource: "ltpo_oled_panel"
        allocation_pct: 25
      - supplier: supplier_samsung_sdi
        resource: "battery_cell"
        allocation_pct: 30

    ai_strategy:
      positioning: "AI全场景生活助手"
      key_investment: ["Galaxy AI端侧能力", "三星Gauss自研模型", "实时翻译与摘要"]
      differentiation: "AI能力贯穿手表、耳机、平板等全产品线"

