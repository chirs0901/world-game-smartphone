# ============================================================
# World State Snapshot Schema
#
# 定义 Engine 每个 tick 输出的世界状态快照结构。
# 这是 API 和 UI 的唯一数据来源——UI 不知道销量怎么算，
# 它只读取 world_state 中的值并渲染。
#
# 这个文件同时是：
# 1. Engine 输出格式的规范文档
# 2. Pydantic model 的 schema 参考
# 3. 前端 API 对接的接口契约
# ============================================================

